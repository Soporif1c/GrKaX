<svg xmlns="http://www.w3.org/2000/svg" width="300" height="620" viewBox="0 0 300 620" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/><stop offset="1" stop-color="#131A31"/>
    </linearGradient>
    <linearGradient id="sw1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8B7CFF"/><stop offset="1" stop-color="#22D3EE"/></linearGradient>
    <linearGradient id="sw2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2DD4BF"/><stop offset="1" stop-color="#38BDF8"/></linearGradient>
    <linearGradient id="sw3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#DB2777"/></linearGradient>
    <clipPath id="scr3"><rect x="0" y="0" width="300" height="620" rx="30"/></clipPath>
  </defs>
  <g clip-path="url(#scr3)">
    <rect width="300" height="620" fill="url(#bg3)"/>
    <text x="22" y="30" fill="#A6ADCE" font-size="12" font-weight="600">9:41</text>
    <g fill="#A6ADCE"><rect x="248" y="21" width="16" height="10" rx="2"/><circle cx="272" cy="26" r="4"/></g>

    <text x="22" y="66" fill="#E7EAF6" font-size="20" font-weight="700">Settings</text>

    <!-- Appearance -->
    <text x="24" y="94" fill="#22D3EE" font-size="11" font-weight="700" letter-spacing="1">APPEARANCE</text>
    <rect x="16" y="102" width="268" height="92" rx="18" fill="#1C2444"/>
    <text x="32" y="124" fill="#E7EAF6" font-size="13" font-weight="600">Theme</text>
    <g text-anchor="middle" font-size="10">
      <circle cx="70" cy="158" r="20" fill="url(#sw1)"/><circle cx="70" cy="158" r="7" fill="#ffffff" opacity="0.9"/><text x="70" y="186" fill="#8B7CFF">Aurora</text>
      <circle cx="150" cy="158" r="20" fill="url(#sw2)"/><text x="150" y="186" fill="#A6ADCE">Ocean</text>
      <circle cx="230" cy="158" r="20" fill="url(#sw3)"/><text x="230" y="186" fill="#A6ADCE">Pearl</text>
    </g>

    <!-- Routing -->
    <text x="24" y="220" fill="#22D3EE" font-size="11" font-weight="700" letter-spacing="1">ROUTING</text>
    <rect x="16" y="228" width="268" height="96" rx="18" fill="#1C2444"/>
    <g font-size="13" fill="#E7EAF6">
      <circle cx="36" cy="252" r="8" fill="none" stroke="#39406B" stroke-width="2"/>
      <text x="54" y="256">Global (proxy everything)</text>
      <circle cx="36" cy="282" r="8" fill="none" stroke="#8B7CFF" stroke-width="2"/><circle cx="36" cy="282" r="4" fill="#8B7CFF"/>
      <text x="54" y="286">Bypass LAN</text>
      <circle cx="36" cy="312" r="8" fill="none" stroke="#39406B" stroke-width="2"/>
      <text x="54" y="316">Bypass LAN + Russia</text>
    </g>

    <!-- Connection -->
    <text x="24" y="350" fill="#22D3EE" font-size="11" font-weight="700" letter-spacing="1">CONNECTION</text>
    <rect x="16" y="358" width="268" height="150" rx="18" fill="#1C2444"/>
    <g font-size="13">
      <text x="32" y="384" fill="#E7EAF6" font-weight="600">Block QUIC</text>
      <rect x="238" y="376" width="34" height="18" rx="9" fill="#8B7CFF"/><circle cx="264" cy="385" r="7" fill="#fff"/>

      <text x="32" y="416" fill="#E7EAF6" font-weight="600">Per-app proxy</text>
      <text x="32" y="432" fill="#A6ADCE" font-size="10">Bypass selected</text>
      <text x="272" y="420" fill="#A6ADCE" text-anchor="end" font-size="16">›</text>

      <text x="32" y="460" fill="#E7EAF6" font-weight="600">Enable IPv6</text>
      <rect x="238" y="452" width="34" height="18" rx="9" fill="#39406B"/><circle cx="248" cy="461" r="7" fill="#8792b5"/>

      <text x="32" y="492" fill="#E7EAF6" font-weight="600">Remote DNS</text>
      <text x="32" y="508" fill="#A6ADCE" font-size="10">1.1.1.1</text>
    </g>

    <!-- bottom nav -->
    <rect x="0" y="568" width="300" height="52" fill="#0E1426"/>
    <g text-anchor="middle">
      <circle cx="60" cy="588" r="3.5" fill="#5a617a"/><text x="60" y="606" fill="#8792b5" font-size="10">Home</text>
      <circle cx="150" cy="588" r="3.5" fill="#5a617a"/><text x="150" y="606" fill="#8792b5" font-size="10">Servers</text>
      <circle cx="240" cy="588" r="3.5" fill="#8B7CFF"/><text x="240" y="606" fill="#8B7CFF" font-size="10" font-weight="600">Settings</text>
    </g>
  </g>
  <rect x="0.5" y="0.5" width="299" height="619" rx="30" fill="none" stroke="#2a3352" stroke-width="1"/>
</svg>
